services:
  - type: web
    name: clipforge-worker
    runtime: docker
    plan: starter
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: LOVABLE_API_KEY
        sync: false
      - key: WORKER_SECRET
        sync: false
      - key: WHISPER_MODEL
        value: small
      - key: MAX_CLIPS
        value: "10"
